server {
    # Listen on port 443 for HTTPS traffic
    listen 443 ssl;
    listen [::]:443 ssl;

    # Domain name
    server_name iabasala.42.fr;

    # SSL certificate and key paths
    ssl_certificate     /etc/nginx/ssl/inception.crt;
    ssl_certificate_key /etc/nginx/ssl/inception.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Root directory for website files
    root   /var/www/html;
    index  index.php index.html;

    # Handle all requests
    #location / {
     #   try_files $uri $uri/ =404;
    #}
     # This makes WordPress URLs work (/about, /shop etc)
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    # Simple test endpoint
    location /test {
        return 200 'Nginx is working without WordPress!\n';
        add_header Content-Type text/plain;
    }

    # Handle PHP requests by forwarding them to the WordPress container
    location ~ \.php$ {
    include        fastcgi_params;
    fastcgi_pass   wordpress:9000;
    fastcgi_index  index.php;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param  PATH_INFO $fastcgi_path_info;
    }
}
